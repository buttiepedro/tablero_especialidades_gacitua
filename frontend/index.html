<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Tablero de especialidades</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main>
    <h1>Tablero de especialidades</h1>
    <section class="card login-card">
      <p class="hero-label">GACITUA BOT</p>
      <h2>Inicio de sesión</h2>
      <form id="login-form">
        <label>
          Usuario
          <input type="text" id="username" autocomplete="username" required />
        </label>
        <label>
          Contraseña
          <input type="password" id="password" autocomplete="current-password" required />
        </label>
        <button type="submit">Entrar</button>
      </form>
      <p id="login-error" class="hint"></p>
      <p class="hint">
        Una vez logueado serás redirigido a la pantalla general, donde podés completar la descripción
        y los datos de la clínica.
      </p>
    </section>
  </main>
  <script src="config.js"></script>
  <script src="shared.js"></script>
  <script src="login.js"></script>
</body>
</html>
